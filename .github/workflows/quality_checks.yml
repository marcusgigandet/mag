name: Code Quality Checks

on:
  pull_request:
    branches:
      - main

jobs:
  call-verify-copyright:
    uses: marcusgigandet/toolbox/.github/workflows/verify_copyright.yml@664e5de7f0b6098b0d292053a3c4f4d57dc5f620
    with:
      config: "config.toml"
      directory: "src"

  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests benchmarks \
            \( -name "*.h" -o -name "*.hpp" -o -name "*.cppm" -o -name "*.cpp" \) \
            -print0 | \
          xargs -0 clang-format --dry-run --Werror