name: macOS Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [llvm-clang]

    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja llvm

      - name: Configure compiler
        run: |
          if [ "${{ matrix.compiler }}" = "llvm-clang" ]; then
            echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
            echo "PRESET=clang-release" >> $GITHUB_ENV
          fi

      - name: Configure CMake
        env:
          CC: ${{ env.CC }}
          CXX: ${{ env.CXX }}
        run: cmake --preset $PRESET -DCMAKE_C_COMPILER=${CC} -DCMAKE_CXX_COMPILER=${CXX} -DMAG_NO_DEV_TOOLS=ON

      - name: Build
        run: cmake --build --preset $PRESET

      - name: Run tests
        run: ctest --preset $PRESET --output-on-failure